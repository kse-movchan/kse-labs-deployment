apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  labels:
    app: my-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: my-app
        image: ghcr.io/kse-movchan/microservice-lab:d24fbd0841fa0b5fb11c6fb0368b425580d70a94
        ports:
        - containerPort: 3000
